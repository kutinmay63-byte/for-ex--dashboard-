<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;">

<h2>Sign Up</h2>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signupUser()">Sign Up</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323",
  measurementId: "G-0WRPF3STXV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signupUser = function () {

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {

      setDoc(doc(db, "users", userCredential.user.uid), {
        email: email,
        vip: false
      });

      msg.style.color = "lightgreen";
      msg.innerText = "Account created! Redirecting...";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    })
    .catch((error) => {
      msg.style.color = "red";
      msg.innerText = error.message;
    });

};

</script>

</body>
</html>
