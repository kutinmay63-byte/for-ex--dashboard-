<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323",
  measurementId: "G-0WRPF3STXV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGN UP + SAVE TO FIRESTORE
window.signup = async function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    // 🔥 SAVE USER IN FIRESTORE
    await setDoc(doc(db, "users", userCred.user.uid), {
      email: email,
      vip: false
    });

    document.getElementById("msg").innerText = "Account created ✅";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    document.getElementById("msg").innerText = error.message;
  }
};
</script>
