<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ THIS FIXES SMALL TEXT ON PHONE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up - Kutin FX</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #38bdf8;
      font-size: 28px;
      margin-bottom: 20px;
    }

    input {
      padding: 14px;
      width: 90%;
      max-width: 320px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px 25px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      width: 90%;
      max-width: 320px;
      margin-top: 10px;
    }

    button:hover {
      background: #16a34a;
    }

    #msg {
      margin-top: 15px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Create Account</h2>

<input id="email" type="email" placeholder="Enter Email">
<br>

<input id="password" type="password" placeholder="Enter Password">
<br>

<button onclick="signupUser()">Sign Up</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signupUser = async function () {

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");

  if (!email || !password) {
    msg.style.color = "red";
    msg.innerText = "Please fill all fields";
    return;
  }

  if (password.length < 6) {
    msg.style.color = "red";
    msg.innerText = "Password must be at least 6 characters";
    return;
  }

  try {

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      email: email,
      vip: false,
      createdAt: new Date()
    });

    msg.style.color = "lightgreen";
    msg.innerText = "Account created successfully! Redirecting...";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    msg.style.color = "red";
    msg.innerText = error.message;
  }

};

</script>

</body>
</html>
