<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;">

<h2 style="color:#38bdf8;">Create Account</h2>

<input id="email" type="email" placeholder="Enter Email"
  style="padding:10px;width:250px;margin:10px;border-radius:5px;border:none;"><br>

<input id="password" type="password" placeholder="Enter Password"
  style="padding:10px;width:250px;margin:10px;border-radius:5px;border:none;"><br>

<button onclick="signupUser()"
  style="padding:10px 20px;background:#22c55e;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">
  Sign Up
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signupUser = function () {

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");

  // Basic validation
  if (!email || !password) {
    msg.style.color = "red";
    msg.innerText = "Please fill all fields";
    return;
  }

  if (password.length < 6) {
    msg.style.color = "red";
    msg.innerText = "Password must be at least 6 characters";
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {

      // Save user in Firestore
      await setDoc(doc(db, "users", userCredential.user.uid), {
        email: email,
        vip: false,
        createdAt: new Date()
      });

      msg.style.color = "lightgreen";
      msg.innerText = "Account created successfully! Redirecting...";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    })
    .catch((error) => {
      msg.style.color = "red";
      msg.innerText = error.message;
    });

};

</script>

</body>
</html>
