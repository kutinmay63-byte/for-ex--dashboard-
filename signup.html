<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:80px;">

<h2>Create Account 🧾</h2>

<input id="email" placeholder="Email" style="padding:10px;margin:5px;"><br>
<input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;"><br>

<button onclick="signup()" style="padding:10px 20px;background:#22c55e;border:none;">
Sign Up
</button>

<p id="msg"></p>

<br>

<a href="login.html" style="color:#38bdf8;">Already have account? Login</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Account created ✅ Redirecting...";
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};
</script>

</body>
</html>
