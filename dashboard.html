<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Kutin FX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* NAV */
.nav {
  background: #0f172a;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: #38bdf8;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 15px;
}

.menu a {
  color: white;
  text-decoration: none;
}

.menu a:hover {
  color: #38bdf8;
}

.logout {
  background: red;
  padding: 8px 12px;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* CONTENT */
.container {
  padding: 20px;
}

.user-box {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}

.vip {
  border: 2px dashed gold;
}

/* INVEST */
.invest {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.calc {
  margin-top: 10px;
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  color: yellow;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">KUTIN FX</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Deposit</a>
    <a href="#">Withdraw</a>
    <a href="#">VIP</a>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div class="user-box">
  <h3>Welcome, <span id="user"></span></h3>
  <p>Status: Active</p>
</div>

<div class="grid">
  <div class="card">💰 Deposit</div>
  <div class="card">🏧 Withdraw</div>
  <div class="card vip">🔥 VIP Section</div>
  <div class="card">
    📲 WhatsApp Group  
    <button onclick="join()">Join</button>
  </div>
</div>

<div class="invest">
<h3>Deposit / Invest</h3>

<input id="amount" type="number" placeholder="Enter amount">

<select id="plan">
  <option value="0.2">Starter (20%)</option>
  <option value="0.5">Pro (50%)</option>
  <option value="1">VIP (100%)</option>
</select>

<button class="calc" onclick="calc()">Calculate</button>

<div class="result" id="result"></div>
</div>

</div>

<script>
// CHECK LOGIN
let user = localStorage.getItem("loggedUser");

if(!user){
  alert("Please login first");
  window.location.href = "index.html";
} else {
  document.getElementById("user").innerText = user;
}

// LOGOUT
function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "index.html";
}

// WHATSAPP
function join(){
  window.open("https://wa.me/254700000000", "_blank");
}

// CALCULATOR
function calc(){
  let amount = document.getElementById("amount").value;
  let rate = document.getElementById("plan").value;

  if(amount === ""){
    document.getElementById("result").innerText = "Enter amount";
    return;
  }

  let profit = amount * rate;
  let total = Number(amount) + profit;

  document.getElementById("result").innerText =
    "Profit: $" + profit + " | Total: $" + total;
}
</script>

</body>
</html>
