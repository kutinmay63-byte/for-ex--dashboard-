<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:80px;">

<h2>Welcome to Dashboard 📊</h2>

<p id="userEmail" style="color:#38bdf8;"></p>

<button onclick="logout()" style="padding:10px 20px;background:#ef4444;border:none;color:white;margin-top:20px;">
Logout
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323",
  measurementId: "G-0WRPF3STXV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 CHECK LOGIN STATUS
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = "Logged in as: " + user.email;
  } else {
    // NOT LOGGED IN → SEND TO LOGIN PAGE
    window.location.href = "login.html";
  }
});

// LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
