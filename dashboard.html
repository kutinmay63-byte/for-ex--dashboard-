<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:100px;">

<h1>Welcome to Kutin FX Dashboard 📊</h1>

<p>Forex Signals & Updates will appear here</p>

<button onclick="logout()" style="padding:10px 20px;background:red;color:white;border:none;">
Logout
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
