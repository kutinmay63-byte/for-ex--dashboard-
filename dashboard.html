<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Kutin FX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* TOP NAV */
.nav {
  background: #0f172a;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
}

.menu {
  display: flex;
  gap: 15px;
  align-items: center;
}

.menu a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  padding: 6px 10px;
  border-radius: 5px;
}

.menu a:hover {
  background: #1f2937;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: red;
  color: white;
}

/* FULL SCREEN */
.container {
  padding: 30px;
}

h2 {
  color: #38bdf8;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

/* CARDS */
.card {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* PRICES */
.price {
  color: #38bdf8;
  font-size: 20px;
  font-weight: bold;
}

/* VIP */
.vip {
  border: 2px dashed #facc15;
  background: #1f2937;
}

/* INVEST SECTION */
.invest-box {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  margin-top: 30px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

.calc-btn {
  background: #38bdf8;
  color: black;
  font-weight: bold;
  width: 100%;
}

/* RESULT */
.result {
  margin-top: 10px;
  color: #facc15;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">KUTIN FX DASHBOARD</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Deposit</a>
    <a href="#">Withdraw</a>
    <a href="#">VIP</a>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

<h2>Welcome, <span id="user"></span></h2>

<!-- MAIN CARDS -->
<div class="grid">

  <div class="card">💰 Deposit Section</div>
  <div class="card">🏧 Withdraw Section</div>
  <div class="card vip">🔥 VIP Section (Open Access)</div>

</div>

<!-- INVEST / DEPOSIT SECTION -->
<div class="invest-box">

<h3 style="color:#38bdf8;">💳 Deposit / Invest</h3>

<label>Enter Amount ($)</label>
<input type="number" id="amount" placeholder="e.g. 100">

<label>Select Plan</label>
<select id="plan">
  <option value="0.2">Starter (20% profit)</option>
  <option value="0.5">Pro (50% profit)</option>
  <option value="1">VIP (100% profit)</option>
</select>

<button class="calc-btn" onclick="calculate()">Calculate Profit</button>

<div class="result" id="result"></div>

</div>

<!-- PRICING -->
<h2 style="margin-top:40px;">Pricing Plans</h2>

<div class="grid">

  <div class="card">
    <h3>Starter Plan</h3>
    <p class="price">$50</p>
    <p>Basic trading access</p>
  </div>

  <div class="card">
    <h3>Pro Plan</h3>
    <p class="price">$200</p>
    <p>Advanced trading tools</p>
  </div>

  <div class="card">
    <h3>VIP Plan</h3>
    <p class="price">$500</p>
    <p>Premium features</p>
  </div>

</div>

</div>

<script>
let user = localStorage.getItem("loggedUser");

if(!user){
  window.location.href = "index.html";
}

document.getElementById("user").innerText = user;

/* LOGOUT */
function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "index.html";
}

/* PROFIT CALCULATOR */
function calculate(){
  let amount = document.getElementById("amount").value;
  let rate = document.getElementById("plan").value;

  if(amount === "" || amount <= 0){
    document.getElementById("result").innerText = "Enter valid amount";
    return;
  }

  let profit = amount * rate;
  let total = parseFloat(amount) + parseFloat(profit);

  document.getElementById("result").innerText =
    "Profit: $" + profit + " | Total: $" + total;
}
</script>

</body>
</html>
