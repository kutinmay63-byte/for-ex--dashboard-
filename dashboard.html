<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ FIX SMALL TEXT ON PHONE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard - Kutin FX</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #38bdf8;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #vipStatus {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      width: 90%;
      max-width: 300px;
    }

    button:hover {
      background: darkred;
    }

    .vip-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid #334155;
    }

  </style>
</head>

<body>

<h2>Dashboard</h2>

<div class="card">

  <p id="status">Checking login...</p>

  <div class="vip-box">
    <p id="vipStatus">Checking VIP status...</p>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");
const vipStatus = document.getElementById("vipStatus");

// 🔒 AUTH CHECK
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  status.innerText = "Welcome, " + user.email;

  try {

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {

      const data = userSnap.data();

      if (data.vip === true) {

        vipStatus.innerText = "💎 VIP ACCESS GRANTED";
        vipStatus.style.color = "lightgreen";

      } else {

        vipStatus.innerText = "🔒 VIP ONLY - Redirecting to payment...";
        vipStatus.style.color = "orange";

        setTimeout(() => {
          window.location.href = "payment.html";
        }, 2000);

      }

    } else {
      vipStatus.innerText = "No user data found";
      vipStatus.style.color = "red";
    }

  } catch (error) {
    vipStatus.innerText = "Error loading VIP status";
    vipStatus.style.color = "red";
  }

});

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

</script>

</body>
</html>
