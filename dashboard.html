<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Kutin FX</title>

<style>
body {margin:0;font-family:Arial;background:#0b1220;color:white;}

.nav {
  background:#0f172a;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {padding:20px;}

.card {
  background:#111827;
  padding:20px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
  <div>KUTIN FX DASHBOARD</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>Welcome, <span id="user"></span></h2>

<div class="card">💰 Deposit Section</div>
<div class="card">🏧 Withdraw Section</div>
<div class="card">🔥 VIP Section (Open Access)</div>
<div class="card">📊 Pricing Plans</div>

</div>

<script>
let user = localStorage.getItem("loggedUser");

if(!user){
  window.location.href = "index.html";
}

document.getElementById("user").innerText = user;

function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "index.html";
}
</script>

</body>
</html>
