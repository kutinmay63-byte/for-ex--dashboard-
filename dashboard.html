<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;">

<h2 style="color:#38bdf8;">Dashboard</h2>

<p id="status">Checking login...</p>

<p id="vipStatus"></p>

<button onclick="logout()"
  style="padding:10px 20px;background:red;color:white;border:none;border-radius:5px;">
  Logout
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");
const vipStatus = document.getElementById("vipStatus");

// 🔒 AUTH + VIP PROTECTION
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  status.innerText = "Welcome " + user.email;

  // 🔥 CHECK FIRESTORE VIP
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {

    const data = userSnap.data();

    if (data.vip === true) {
      vipStatus.innerText = "💎 VIP ACCESS GRANTED";
      vipStatus.style.color = "lightgreen";
    } else {
      vipStatus.innerText = "🔒 VIP ONLY - Redirecting to payment...";
      vipStatus.style.color = "orange";

      setTimeout(() => {
        window.location.href = "payment.html";
      }, 2000);
    }

  } else {
    vipStatus.innerText = "User data not found";
  }

});

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

</script>

</body>
</html>
