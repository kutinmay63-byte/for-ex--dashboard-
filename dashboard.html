<!DOCTYPE html>
<html>
<head>
  <title>Kutin FX Dashboard</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;margin:0;">

<div style="background:#020617;padding:15px;text-align:center;font-size:22px;color:#38bdf8;font-weight:bold;">
  Kutin FX Academy 📊
</div>

<div style="text-align:center;padding:20px;">
  <h2>Welcome Trader 👋</h2>
  <p id="userEmail" style="color:#38bdf8;"></p>

  <button onclick="logout()" style="padding:10px 20px;background:#ef4444;border:none;color:white;border-radius:6px;">
    Logout
  </button>
</div>

<!-- FREE CONTENT -->
<div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:20px;">

  <div style="background:#1e293b;padding:15px;border-radius:10px;width:80%;max-width:400px;">
    📈 Free Daily Signals
  </div>

  <div style="background:#1e293b;padding:15px;border-radius:10px;width:80%;max-width:400px;">
    🎓 Beginner Lessons
  </div>

</div>

<!-- VIP SECTION -->
<div style="text-align:center;margin-top:30px;">

  <h3 style="color:#fbbf24;">VIP Content 🔒</h3>

  <div id="vipBox" style="display:none;flex-direction:column;align-items:center;gap:10px;">

    <div style="background:#0ea5e9;padding:15px;border-radius:10px;width:80%;max-width:400px;">
      💰 Premium Signals (VIP)
    </div>

    <div style="background:#0ea5e9;padding:15px;border-radius:10px;width:80%;max-width:400px;">
      📊 Advanced Strategy
    </div>

  </div>

  <div id="lockedBox">
    <p style="color:#94a3b8;">Upgrade to access VIP content</p>
    <a href="payment.html"
       style="display:inline-block;padding:12px 20px;background:#fbbf24;color:black;text-decoration:none;border-radius:8px;font-weight:bold;">
       Upgrade Now 💳
    </a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323",
  measurementId: "G-0WRPF3STXV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = user.email;

    // VIP CHECK
    if (localStorage.getItem("vip") === "true") {
      document.getElementById("vipBox").style.display = "flex";
      document.getElementById("lockedBox").style.display = "none";
    }

  } else {
    window.location.href = "login.html";
  }
});

// LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
