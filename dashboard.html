<!DOCTYPE html>
<html>
<head>
<title>KUTIN FX Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP NAV */
.nav{
  background:#0f172a;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:#38bdf8;
  font-weight:bold;
  font-size:20px;
}

.logout{
  background:red;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:6px;
}

/* DASHBOARD HEADER */
.header{
  padding:20px;
}

.balance-box{
  background:linear-gradient(145deg,#111827,#1f2937);
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

.balance{
  font-size:28px;
  color:#00ff9d;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.vip{
  border:2px solid gold;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.invest-btn{
  background:#38bdf8;
  color:black;
}

.whatsapp-btn{
  background:#25D366;
  color:white;
}

/* INVEST SECTION */
.section{
  padding:20px;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

/* PLAN */
.plan{
  margin-top:10px;
  background:#1f2937;
  padding:12px;
  border-radius:10px;
}

.plan h3{
  color:#38bdf8;
}

.plan.vip h3{
  color:gold;
}

.plan-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.plan-card{
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  border:1px solid #374151;
  text-align:center;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">KUTIN FX</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- HEADER -->
<div class="header">

  <div class="balance-box">
    <h3>Welcome, <span id="user"></span></h3>
    <p>Live Balance</p>
    <div class="balance">$ <span id="balance">0</span></div>
  </div>

  <div class="grid">
    <div class="card">💰 Deposit<br><button class="btn invest-btn">Invest</button></div>
    <div class="card">🏧 Withdraw<br><button class="btn invest-btn">Request</button></div>
    <div class="card vip">🔥 VIP</div>

    <div class="card">
      📲 WhatsApp
      <button class="btn whatsapp-btn" onclick="join()">Join Group</button>
    </div>
  </div>
</div>

<!-- INVEST -->
<div class="section">

<div class="box">
  <h3>Investment Calculator</h3>

  <input id="amount" type="number" placeholder="Enter amount">

  <select id="plan">
    <option value="0.2">Starter (20%)</option>
    <option value="0.5">Pro (50%)</option>
    <option value="1">VIP (100%)</option>
  </select>

  <button class="btn invest-btn" onclick="calc()">Calculate</button>

  <p id="result"></p>
</div>

<!-- PLANS -->
<div class="plan">
  <h3>⚡ 24 Hour Plans</h3>
  <div class="plan-grid">
    <div class="plan-card">£400 → £8000</div>
    <div class="plan-card">£500 → £10000</div>
    <div class="plan-card">£600 → £12000</div>
    <div class="plan-card">£700 → £14000</div>
    <div class="plan-card">£800 → £16000</div>
  </div>
</div>

<div class="plan vip">
  <h3>💎 3 Days Plans</h3>
  <div class="plan-grid">
    <div class="plan-card">£1000 → £30000</div>
    <div class="plan-card">£2000 → £60000</div>
    <div class="plan-card">£3000 → £90000</div>
    <div class="plan-card">£4000 → £120000</div>
    <div class="plan-card">£5000 → £150000</div>
  </div>
</div>

</div>

<script>

// LOGIN CHECK
let user = localStorage.getItem("loggedUser");

if(!user){
  alert("Please login first");
  window.location.href = "index.html";
}else{
  document.getElementById("user").innerText = user;
}

// FAKE LIVE BALANCE
let balance = 250;
setInterval(()=>{
  balance += Math.floor(Math.random()*5);
  document.getElementById("balance").innerText = balance;
},3000);

// LOGOUT
function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href="index.html";
}

// WHATSAPP (YOUR NUMBER)
function join(){
  window.open("https://wa.me/14315061916","_blank");
}

// CALCULATOR
function calc(){
  let amount = document.getElementById("amount").value;
  let rate = document.getElementById("plan").value;

  if(amount===""){
    document.getElementById("result").innerText="Enter amount";
    return;
  }

  let profit = amount * rate;
  let total = Number(amount) + Number(profit);

  document.getElementById("result").innerText =
  "Profit: $"+profit+" | Total: $"+total;
}

</script>

</body>
</html>
