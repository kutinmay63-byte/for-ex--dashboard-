<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Kutin FX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* NAV */
.nav {
  background: #0f172a;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
}

.menu {
  display: flex;
  gap: 15px;
  align-items: center;
}

.menu a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  padding: 6px 10px;
  border-radius: 5px;
}

.menu a:hover {
  background: #1f2937;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 30px;
}

/* USER INFO CARD */
.user-box {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.user-box h3 {
  margin: 0;
  color: #38bdf8;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}
