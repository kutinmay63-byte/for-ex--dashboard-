<!DOCTYPE html>
<html>
<head>
<title>Login - Kutin FX</title>
<style>
body {font-family:Arial;background:#0b1220;color:white;text-align:center;padding:50px;}
input {padding:10px;margin:5px;width:200px;}
button {padding:10px 20px;margin-top:10px;cursor:pointer;}
.box {background:#111827;padding:30px;border-radius:10px;display:inline-block;}
</style>
</head>

<body>

<div class="box">
<h2>Kutin FX Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>

<script>
function signup(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  localStorage.setItem(u, p);
  alert("Account created!");
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let stored = localStorage.getItem(u);

  if(stored && stored === p){
    localStorage.setItem("loggedUser", u);
    window.location.href = "dashboard.html";
  } else {
    alert("User data not found or wrong password");
  }
}
</script>

</body>
</html>
