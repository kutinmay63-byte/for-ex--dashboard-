<!DOCTYPE html>
<html>
<head>
<title>Kutin FX Login</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
  padding: 50px;
}

.box {
  background: #111827;
  padding: 30px;
  border-radius: 10px;
  display: inline-block;
}

input {
  padding: 10px;
  margin: 8px;
  width: 220px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.login { background: #38bdf8; }
.signup { background: green; color: white; }
</style>
</head>

<body>

<div class="box">
<h2>Kutin FX</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button class="login" onclick="login()">Login</button>
<button class="signup" onclick="signup()">Sign Up</button>
</div>

<script>
function signup(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "" || p === ""){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem(u, p);
  alert("Account created successfully!");
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let stored = localStorage.getItem(u);

  if(stored && stored === p){
    localStorage.setItem("loggedUser", u);
    window.location.href = "dashboard.html";
  } else {
    alert("User data not found or wrong password");
  }
}
</script>

</body>
</html>
