<!DOCTYPE html>
<html>
<head>
  <title>Login - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:80px;">

<h2>Login 📊</h2>

<input id="email" placeholder="Email" style="padding:10px;margin:5px;width:250px;"><br>
<input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;width:250px;"><br>

<button onclick="login()" style="padding:10px 20px;background:#38bdf8;border:none;margin-top:10px;">
Login
</button>

<p id="msg"></p>

<br>
<a href="signup.html" style="color:#22c55e;">Create account</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCuhE2B1DBg_ibkyOXdTH7a-BqlHWxaSQM",
  authDomain: "kutinfx-e0e5b.firebaseapp.com",
  projectId: "kutinfx-e0e5b",
  storageBucket: "kutinfx-e0e5b.firebasestorage.app",
  messagingSenderId: "292559932570",
  appId: "1:292559932570:web:07a9baf6596b8ad695e323",
  measurementId: "G-0WRPF3STXV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN FUNCTION
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").style.color = "#22c55e";
      document.getElementById("msg").innerText = "Login successful ✅";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1500);
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};
</script>

</body>
</html>
