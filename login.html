<!DOCTYPE html>
<html>
<head>
  <title>Login - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;">

<h2 style="color:#38bdf8;">Login to Dashboard</h2>

<input id="email" type="email" placeholder="Enter email"
  style="padding:10px;width:250px;margin:10px;border-radius:5px;border:none;"><br>

<input id="password" type="password" placeholder="Enter password"
  style="padding:10px;width:250px;margin:10px;border-radius:5px;border:none;"><br>

<button onclick="loginUser()"
  style="padding:10px 20px;background:#38bdf8;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">
  Login
</button>

<p id="msg"></p>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // 🔥 PUT YOUR FIREBASE CONFIG HERE (from Firebase website)
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY_HERE",
    authDomain: "PASTE_YOUR_AUTH_DOMAIN_HERE",
    projectId: "PASTE_YOUR_PROJECT_ID_HERE",
    appId: "PASTE_YOUR_APP_ID_HERE"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.loginUser = function () {

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.style.color = "lightgreen";
        msg.innerText = "Login successful... Redirecting";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      })
      .catch((error) => {
        msg.style.color = "red";
        msg.innerText = error.message;
      });

  }

</script>

</body>
</html>
