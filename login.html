<!DOCTYPE html>
<html>
<head>
  <title>Login - Kutin FX</title>
</head>
<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:100px;">

<h2>Login to Kutin FX</h2>

<input id="email" placeholder="Email" style="padding:10px;margin:5px;"><br>
<input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;"><br>

<button onclick="login()" style="padding:10px 20px;background:#38bdf8;border:none;">
Login
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};
</script>

</body>
</html>
