<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Kutin FX</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:60px;">

<h2>Admin Panel 📊</h2>

<input id="pair" placeholder="Pair (e.g. EUR/USD)" style="padding:10px;margin:5px;"><br>
<input id="signal" placeholder="BUY or SELL" style="padding:10px;margin:5px;"><br>
<input id="note" placeholder="Notes" style="padding:10px;margin:5px;"><br>

<button onclick="postSignal()" style="padding:10px 20px;background:#22c55e;border:none;">
Post Signal
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.postSignal = async function () {
  let pair = document.getElementById("pair").value;
  let signal = document.getElementById("signal").value;
  let note = document.getElementById("note").value;

  try {
    await addDoc(collection(db, "signals"), {
      pair,
      signal,
      note,
      time: new Date()
    });

    document.getElementById("msg").innerText = "Signal posted ✅";
  } catch (e) {
    document.getElementById("msg").innerText = e.message;
  }
};
</script>

</body>
</html>
