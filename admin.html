<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:60px;">

<h2>Admin Login 🔐</h2>

<div id="loginBox">
  <input id="email" placeholder="Admin Email" style="padding:10px;margin:5px;"><br>
  <input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;"><br>

  <button onclick="login()" style="padding:10px 20px;background:#38bdf8;border:none;">
    Login
  </button>

  <p id="msg"></p>
</div>

<div id="panel" style="display:none;">
  <h2>Post Forex Signal 📊</h2>

  <input id="pair" placeholder="Pair (EUR/USD)" style="padding:10px;margin:5px;"><br>
  <input id="signal" placeholder="BUY or SELL" style="padding:10px;margin:5px;"><br>
  <input id="note" placeholder="Notes" style="padding:10px;margin:5px;"><br>

  <button onclick="postSignal()" style="padding:10px 20px;background:#22c55e;border:none;">
    Post Signal
  </button>

  <p id="status"></p>

  <button onclick="logout()" style="margin-top:20px;padding:10px;background:red;color:white;border:none;">
    Logout
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((user) => {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("panel").style.display = "block";
    })
    .catch((err) => {
      document.getElementById("msg").innerText = err.message;
    });
};

// POST SIGNAL
window.postSignal = async function () {
  let pair = document.getElementById("pair").value;
  let signal = document.getElementById("signal").value;
  let note = document.getElementById("note").value;

  try {
    await addDoc(collection(db, "signals"), {
      pair,
      signal,
      note,
      time: new Date()
    });

    document.getElementById("status").innerText = "Signal posted ✅";
  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
};

// LOGOUT
window.logout = function () {
  signOut(auth).then(() => location.reload());
};
</script>

</body>
</html>
