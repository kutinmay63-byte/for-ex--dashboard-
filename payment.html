<!DOCTYPE html>
<html>
<head>
  <title>Upgrade to VIP</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;text-align:center;padding:40px;">

<h2>VIP Upgrade 💎</h2>

<p>Pay to unlock premium content</p>

<button onclick="upgradeVIP()"
style="padding:12px 20px;background:gold;border:none;border-radius:6px;">
Pay Now (Demo)
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.upgradeVIP = async function () {

  let user = auth.currentUser;

  if (!user) {
    document.getElementById("msg").innerText = "Login first";
    return;
  }

  await updateDoc(doc(db, "users", user.uid), {
    vip: true
  });

  document.getElementById("msg").innerText = "VIP Activated!";
  
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1500);
}
</script>

</body>
</html>
